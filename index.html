<!DOCTYPE html>
<html lang="IT">
<head>
    <meta charset="utf-8" />
    <title>Apples</title>
    <style>
        :root {
            --bg:           #000f07;
            --bg-elevated:  #001a0a;
            --bg-card:      #00220d;
            --accent:       #a3e635;
            --accent-dim:   rgba(163, 230, 53, 0.15);
            --accent-dim2:  rgba(163, 230, 53, 0.07);
            --border:       #0d3d1f;
            --border-accent:#a3e635;
            --text:         #e8fdf0;
            --muted:        #4d9e6e;
            --muted-light:  #7ecfa0;
            --online:       #4ade80;
            --seen:         #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Titlebar --- */
        #titlebar {
            -webkit-app-region: drag;
            height: 32px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            flex-shrink: 0;
        }

        #titlebar-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        #titlebar-label span {
            color: var(--accent);
        }

        /* --- Setup screen --- */
        #setup {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        #logo {
            font-size: 4rem;
            line-height: 1;
        }

        #setup h1 {
            font-size: 1.4rem;
            font-weight: normal;
            color: var(--accent);
            letter-spacing: 0.08em;
        }

        #setup p {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        #loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        /* --- Main layout --- */
        #feed {
            flex: 1;
            display: grid;
            grid-template-columns: 210px 1fr;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        #sidebar {
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #profile-section {
            padding: 16px 14px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #avatar-placeholder {
            width: 72px;
            height: 72px;
            border: 1px solid var(--border-accent);
            background: var(--bg-card);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 11px;
            transition: border-color 0.15s;
            flex-shrink: 0;
        }

        #avatar-placeholder:hover { border-color: var(--accent); }

        #nickname {
            font-size: 12px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 0.03em;
            text-align: center;
            word-break: break-all;
        }

        #stats-row {
            display: flex;
            width: 100%;
            border: 1px solid var(--border);
        }

        .stat-cell {
            flex: 1;
            text-align: center;
            padding: 5px 4px;
        }

        .stat-cell + .stat-cell {
            border-left: 1px solid var(--border);
        }

        .stat-n {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-l {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        /* --- Sidebar sections --- */
        .sidebar-section {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .section-label {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        /* Feed list */
        #feed-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .feed-list-item {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 5px 7px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 11px;
            color: var(--muted-light);
            border: 1px solid transparent;
            transition: all 0.1s;
            white-space: nowrap;
            overflow: hidden;
        }

        .feed-list-item:hover {
            background: var(--accent-dim2);
            color: var(--text);
        }

        .feed-list-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: rgba(163,230,53,0.2);
        }

        .feed-bullet {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }

        .feed-list-item.active .feed-bullet {
            background: var(--accent);
        }

        .feed-list-item .home-badge {
            font-size: 8px;
            color: var(--accent);
            border: 1px solid rgba(163,230,53,0.3);
            padding: 0 4px;
            flex-shrink: 0;
        }

        /* Join input */
        #join-row {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        #add-feed-key {
            flex: 1;
            min-width: 0;
            font-family: inherit;
            font-size: 9px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted-light);
            padding: 4px 6px;
            outline: none;
        }

        #add-feed-key:focus { border-color: var(--accent); }
        #add-feed-key::placeholder { color: var(--muted); }

        #add-feed-btn {
            font-family: inherit;
            font-size: 9px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted-light);
            padding: 4px 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        #add-feed-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Peer discovery */
        #discovery-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .peer-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 4px;
            border-bottom: 1px solid #05200f;
        }

        .peer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .peer-dot.online { background: var(--online); }
        .peer-dot.seen   { background: var(--seen); }

        .peer-info { flex: 1; min-width: 0; overflow: hidden; }

        .peer-nick {
            font-size: 10px;
            font-weight: bold;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .peer-key {
            font-size: 9px;
            color: var(--muted);
        }

        .peer-btn {
            font-family: inherit;
            font-size: 9px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 2px 6px;
            cursor: pointer;
            white-space: nowrap;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .peer-btn:hover { border-color: var(--accent); color: var(--accent); }
        .peer-btn.following { border-color: rgba(163,230,53,0.4); color: var(--accent); }

        .peer-empty {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            padding: 10px 0;
        }

        /* --- Content column --- */
        #content-col {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tab bar */
        #tab-bar {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 2px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .feed-tab {
            font-family: inherit;
            font-size: 10px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            padding: 8px 10px 6px;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .feed-tab:hover { color: var(--text); }

        .feed-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-spacer { flex: 1; }

        #peers-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--muted);
            flex-shrink: 0;
        }

        #peers-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--online);
        }

        /* Posts */
        #posts {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #posts::-webkit-scrollbar { width: 4px; }
        #posts::-webkit-scrollbar-track { background: transparent; }
        #posts::-webkit-scrollbar-thumb { background: var(--border); }

        .post {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 9px 12px;
            transition: border-color 0.15s;
        }

        .post:hover { border-color: rgba(163,230,53,0.25); }
        .post.own { border-color: rgba(163,230,53,0.2); background: var(--bg-card); }

        .post-header {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .post-author {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent);
        }

        .post-tag {
            font-size: 9px;
            border: 1px solid var(--border);
            color: var(--muted-light);
            padding: 1px 6px;
            border-radius: 2px;
        }

        .post-time {
            font-size: 9px;
            color: var(--muted);
            margin-left: auto;
        }

        .post-body {
            font-size: 12px;
            color: var(--text);
            line-height: 1.55;
            white-space: pre-wrap;
        }

        /* Compose area */
        #compose {
            border-top: 1px solid var(--border);
            padding: 10px 14px;
            background: var(--bg-elevated);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #feed-name {
            font-family: inherit;
            font-size: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--muted-light);
            padding: 5px 10px;
            outline: none;
            width: 100%;
        }

        #feed-name:focus { border-color: rgba(163,230,53,0.4); }
        #feed-name::placeholder { color: var(--muted); }

        #post-form {
            display: flex;
            gap: 6px;
        }

        #post-text {
            flex: 1;
            font-family: inherit;
            font-size: 12px;
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 7px 12px;
            outline: none;
        }

        #post-text:focus { background: var(--bg-elevated); }
        #post-text::placeholder { color: var(--muted); }

        #send-btn {
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 7px 18px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.1s;
        }

        #send-btn:hover { opacity: 0.85; }

        /* Generic button for setup */
        .btn-primary {
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 10px 28px;
            cursor: pointer;
            letter-spacing: 0.06em;
            font-weight: bold;
        }

        .btn-primary:hover { opacity: 0.85; }

        .hidden { display: none !important; }

        /* Unfollow btn in tab bar */
        #unfollow-btn {
            font-family: inherit;
            font-size: 9px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 2px;
            flex-shrink: 0;
        }

        #unfollow-btn:hover { border-color: #c0392b; color: #e74c3c; }

        select#feed-select { display: none; }
    </style>

    <script type="module" src="./app.js"></script>
</head>
<body>

<div id="titlebar">
    <pear-ctrl></pear-ctrl>
    <span id="titlebar-label">🍎 <span>Apples</span> · P2P microblog</span>
</div>

<!-- Setup -->
<div id="setup">
    <div id="logo">🍎</div>
    <h1>APPLES</h1>
    <p>microblog p2p · powered by pear</p>
    <button class="btn-primary" id="create-feed" style="margin-top:1.5rem;">Crea account</button>
</div>

<div id="loading" class="hidden">
    <span>inizializzazione rete…</span>
</div>

<!-- Feed UI -->
<div id="feed" class="hidden">

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="profile-section">
            <div id="avatar-placeholder" title="Clicca per cambiare avatar"></div>
            <input id="avatar-input" type="file" accept="image/*" class="hidden" />
            <div id="nickname"></div>
            <div id="stats-row">
                <div class="stat-cell">
                    <div class="stat-n" id="followers-count">0</div>
                    <div class="stat-l">follower</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-n" id="following-count">0</div>
                    <div class="stat-l">seguiti</div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="section-label">▸ FEED SEGUITI</div>
            <div id="feed-list"></div>
            <div id="join-row">
                <input id="add-feed-key" placeholder="Incolla una feed key…" />
                <button id="add-feed-btn">+ Join</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="section-label">▸ PEER NELLA RETE</div>
            <div id="discovery-list">
                <div class="peer-empty">Nessun peer rilevato…</div>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div id="content-col">
        <div id="tab-bar">
            <div class="tab-spacer"></div>
            <div id="peers-badge">
                <div id="peers-indicator"></div>
                <span id="peers-count">0</span> peer
            </div>
            <button id="unfollow-btn" title="Smetti di seguire il feed attivo">✕ unfollow</button>
        </div>

        <!-- Hidden select kept for JS compatibility -->
        <select id="feed-select"></select>
        <!-- Hidden span for JS compatibility -->
        <span id="current-key" class="hidden"></span>

        <div id="posts"></div>

        <div id="compose">
            <input id="feed-name" placeholder="Tag del post (es. tech, personal…)" />
            <form id="post-form">
                <input id="post-text" type="text" placeholder="Scrivi un post…" required />
                <button type="submit" id="send-btn">Invia</button>
            </form>
        </div>
    </div>
</div>

<script>
// Feed list sidebar sync — bridges the hidden <select> with the visible #feed-list
// This runs after app.js populates feedSelect, keeping the two in sync.
(function () {
    function syncFeedList () {
        const select = document.getElementById('feed-select')
        const list   = document.getElementById('feed-list')
        const currentKey = document.getElementById('current-key')
        if (!select || !list) return

        list.innerHTML = ''
        for (const opt of select.options) {
            if (opt.textContent.startsWith('HOME')) continue

            const item = document.createElement('div')
            item.className = 'feed-list-item' + (opt.value === select.value ? ' active' : '')
            item.dataset.key = opt.value

            const bullet = document.createElement('div')
            bullet.className = 'feed-bullet'

            const label = document.createElement('span')
            label.style.overflow = 'hidden'
            label.style.textOverflow = 'ellipsis'
            label.textContent = opt.value.slice(0, 14) + '…'

            item.appendChild(bullet)
            item.appendChild(label)

            item.addEventListener('click', () => {
                select.value = opt.value
                select.dispatchEvent(new Event('change'))
            })

            list.appendChild(item)
        }

        // Message when user doesn't follow anyone
        if (list.children.length === 0) {
            const empty = document.createElement('div')
            empty.style.fontSize = '10px'
            empty.style.color = 'var(--muted)'
            empty.style.padding = '4px 7px'
            empty.textContent = 'Non segui ancora nessuno'
            list.appendChild(empty)
        }
    }

    // Sync tab bar
    function syncTabBar () {
        const select = document.getElementById('feed-select')
        const tabBar = document.getElementById('tab-bar')
        if (!select || !tabBar) return

        const existingTabs = tabBar.querySelectorAll('.feed-tab')
        existingTabs.forEach(t => t.remove())

        const spacer = tabBar.querySelector('.tab-spacer')

        for (const opt of select.options) {
            const tab = document.createElement('button')
            tab.className = 'feed-tab' + (opt.value === select.value ? ' active' : '')
            tab.textContent = opt.textContent.startsWith('HOME')
                ? '🍎 home'
                : opt.value.slice(0, 8) + '…'
            tab.dataset.key = opt.value
            tab.addEventListener('click', () => {
                select.value = opt.value
                select.dispatchEvent(new Event('change'))
            })
            tabBar.insertBefore(tab, spacer)
        }
    }

    // Observe changes to the hidden select
    const observer = new MutationObserver(() => {
        syncFeedList()
        syncTabBar()
    })

    // Also observe the active feed key span
    function startObserving () {
        const select = document.getElementById('feed-select')
        const currentKey = document.getElementById('current-key')
        if (select) {
            observer.observe(select, { childList: true, attributes: true, subtree: true })
            select.addEventListener('change', () => {
                syncFeedList()
                syncTabBar()
            })
        }
        if (currentKey) {
            new MutationObserver(() => {
                syncFeedList()
                syncTabBar()
            }).observe(currentKey, { childList: true, characterData: true, subtree: true })
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startObserving)
    } else {
        startObserving()
    }
})()
</script>

</body>
</html>
