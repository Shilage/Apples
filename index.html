<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Microblog P2P</title>
    <style>
      /* Basic dark theme similar to Pear examples */
      body {
        margin: 0;
        padding: 0;
        font-family: monospace;
        background-color: #001601;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #titlebar {
        -webkit-app-region: drag;
        height: 30px;
        width: 100%;
        position: fixed;
        left: 0;
        top: 0;
        background-color: rgba(176, 217, 68, 0.1);
        filter: drop-shadow(2px 10px 6px #888);
        display: flex;
        align-items: center;
        padding-left: 6px;
      }
      main {
        flex: 1;
        padding-top: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      button, input {
        all: unset;
        border: 1px ridge #B0D944;
        background: #000;
        color: #B0D944;
        padding: 0.4rem;
        margin: 0.25rem;
        font-family: monospace;
        font-size: 1rem;
      }
      button:hover {
        background: #B0D944;
        color: #000;
        cursor: pointer;
      }
      .hidden {
        display: none !important;
      }
      #feed {
        width: 80%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
      }
      #header {
        margin-bottom: 1rem;
      }
      #posts {
        flex: 1;
        height: 50vh;
        overflow-y: auto;
        border: 1px solid #B0D944;
        padding: 0.5rem;
        margin-bottom: 0.5rem;
      }
      #post-form {
        display: flex;
      }
      #post-form input {
        flex: 1;
      }
    </style>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div id="titlebar">
      <pear-ctrl></pear-ctrl>
      <span style="margin-left: 1rem;">P2P Microblog</span>
    </div>
    <main>
      <!-- Setup screen -->
      <div id="setup">
        <div style="margin-bottom: 1rem; text-align: center;">
          <button id="create-feed">Crea nuovo feed</button>
        </div>
        <div id="or" style="margin: 1rem;">- oppure -</div>
        <form id="join-form" style="display: flex; flex-direction: column; align-items: center;">
          <input id="feed-key" type="text" placeholder="Inserisci chiave feed" required style="width: 280px;" />
          <button type="submit" id="join-feed">Unisciti al feed</button>
        </form>
      </div>
      <div id="loading" class="hidden">In connessione...</div>
      <!-- Feed UI -->
      <div id="feed" class="hidden">
        <div id="header">
          <div><strong>Feed key:</strong> <span id="current-key"></span></div>
          <div><strong>Peer connessi:</strong> <span id="peers-count">0</span></div>
        </div>
        <div id="posts"></div>
        <form id="post-form">
          <input id="post-text" type="text" placeholder="Scrivi un post..." required />
          <button type="submit">Invia</button>
        </form>
      </div>
    </main>
  </body>
</html>
